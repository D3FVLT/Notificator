name: Build and Deploy Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PLUGIN_NAME: Notificator
  DALAMUD_HOME: /tmp/dalamud

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          mkdir -p $DALAMUD_HOME
          curl -L https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -o dalamud.zip
          unzip dalamud.zip -d $DALAMUD_HOME

      - name: Get version from tag
        id: version
        run: |
          RAW=${GITHUB_REF_NAME#v}
          IFS='.' read -ra PARTS <<< "$RAW"
          while [ ${#PARTS[@]} -lt 4 ]; do PARTS+=("0"); done
          VERSION="${PARTS[0]}.${PARTS[1]}.${PARTS[2]}.${PARTS[3]}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Build
        run: >-
          dotnet build --configuration Release --no-restore
          -p:Version=${{ steps.version.outputs.version }}

      - name: Prepare Release
        run: |
          mkdir -p release
          # DalamudPackager with MakeZip=true creates Notificator/latest.zip in output
          cp ${{ env.PLUGIN_NAME }}/bin/Release/${{ env.PLUGIN_NAME }}/latest.zip release/${{ env.PLUGIN_NAME }}.zip

      - name: Generate pluginmaster.json
        run: |
          # Read the DalamudPackager-generated manifest and wrap in array with download links
          MANIFEST=$(cat ${{ env.PLUGIN_NAME }}/bin/Release/${{ env.PLUGIN_NAME }}/Notificator.json)
          python3 -c "
          import json, sys
          m = json.loads(sys.argv[1])
          m['DownloadLinkInstall'] = 'https://github.com/${{ github.repository }}/releases/latest/download/Notificator.zip'
          m['DownloadLinkUpdate'] = 'https://github.com/${{ github.repository }}/releases/latest/download/Notificator.zip'
          m['DownloadLinkTesting'] = 'https://github.com/${{ github.repository }}/releases/latest/download/Notificator.zip'
          m['LastUpdate'] = '${{ github.run_number }}'
          print(json.dumps([m], indent=2))
          " "$MANIFEST" > release/pluginmaster.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/${{ env.PLUGIN_NAME }}.zip
            release/pluginmaster.json
          generate_release_notes: true

      - name: Update repo pluginmaster.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          cp release/pluginmaster.json pluginmaster.json
          git add pluginmaster.json
          git commit -m "Update pluginmaster.json for ${{ github.ref_name }}" || true
          git push || true
