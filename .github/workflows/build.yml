name: Build and Deploy Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PLUGIN_NAME: Notificator
  DALAMUD_HOME: /tmp/dalamud

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          mkdir -p $DALAMUD_HOME
          curl -L https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -o dalamud.zip
          unzip dalamud.zip -d $DALAMUD_HOME

      - name: Get version from tag
        id: version
        run: |
          RAW=${GITHUB_REF_NAME#v}
          # Ensure 4-part version (e.g. 0.0.5 → 0.0.5.0)
          IFS='.' read -ra PARTS <<< "$RAW"
          while [ ${#PARTS[@]} -lt 4 ]; do PARTS+=("0"); done
          VERSION="${PARTS[0]}.${PARTS[1]}.${PARTS[2]}.${PARTS[3]}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }} -p:AssemblyVersion=${{ steps.version.outputs.version }} -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Prepare Release
        run: |
          mkdir -p release
          cd ${{ env.PLUGIN_NAME }}/bin/Release
          zip -r ../../../release/${{ env.PLUGIN_NAME }}.zip *.dll *.json

      - name: Generate pluginmaster.json
        run: |
          cat > release/pluginmaster.json << 'EOF'
          [
            {
              "Author": "D3FVLT",
              "Name": "Notificator",
              "Punchline": "Telegram notifications for FFXIV events",
              "Description": "Send Telegram notifications for various in-game events like level ups, currency thresholds, duty completion, and more.",
              "InternalName": "Notificator",
              "AssemblyVersion": "${{ steps.version.outputs.version }}",
              "RepoUrl": "https://github.com/${{ github.repository }}",
              "ApplicableVersion": "any",
              "Tags": ["notifications", "telegram", "alerts"],
              "DalamudApiLevel": 14,
              "IconUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/images/icon.png",
              "DownloadLinkInstall": "https://github.com/${{ github.repository }}/releases/latest/download/Notificator.zip",
              "DownloadLinkUpdate": "https://github.com/${{ github.repository }}/releases/latest/download/Notificator.zip",
              "DownloadLinkTesting": "https://github.com/${{ github.repository }}/releases/latest/download/Notificator.zip",
              "LastUpdate": "${{ github.run_number }}"
            }
          ]
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/${{ env.PLUGIN_NAME }}.zip
            release/pluginmaster.json
          generate_release_notes: true

      - name: Update repo pluginmaster.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          cp release/pluginmaster.json pluginmaster.json
          git add pluginmaster.json
          git commit -m "Update pluginmaster.json for ${{ github.ref_name }}" || true
          git push || true
